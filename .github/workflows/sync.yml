# Keep the portfolio site (mguttmann.github.io) in lock-step with the LIVE data,
# exactly like the profile README does. Two dynamic blocks in index.html are
# regenerated from public sources on a daily schedule:
#
#   * FEATURED:START / FEATURED:END  - the owner's pinned repositories
#       (GraphQL pinnedItems, same query the README's featured-from-pins uses)
#   * OPENCODE:START / OPENCODE:END  - the headline open PR on anomalyco/opencode
#       (gh pr list, same honest framing as the README's opencode_pr.py)
#
# The Activity visuals (3D contribution calendar + language donut composite, and
# the snake) are NOT handled here: they are hot-linked from the profile repo's
# `output` branch (raw.githubusercontent.com), so they already refresh daily via
# that repo's own Actions, with no redeploy of this site.
#
# Built-in GITHUB_TOKEN is sufficient: it has default READ access to PUBLIC
# pinnedItems via GraphQL and to PUBLIC cross-repo pull requests. No PAT needed.
#
# LOOP PROTECTION: the commit lands on `main`, but there is NO `push` trigger
# here (schedule + manual only), the commit is pushed with GITHUB_TOKEN (which
# does not re-trigger workflows), and it additionally carries [skip ci].
name: Sync site content (Featured + opencode)

on:
  # Daily, staggered AFTER the profile repo's pin sync (06:00 UTC) so the pins
  # this site reads are already fresh for the day.
  schedule:
    - cron: "45 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-site-content
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate Featured + opencode blocks from live data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 .github/scripts/sync_featured.py
          python3 .github/scripts/sync_opencode.py

      - name: Commit index.html if it changed
        run: |
          set -euo pipefail
          if git diff --quiet -- index.html; then
            echo "index.html unchanged - nothing to commit (idempotent no-op)."
          else
            git config user.name "Manuel Guttmann"
            git config user.email "manuelguttmann@icloud.com"
            git add index.html
            git commit -m "chore: sync Featured + opencode from live data [skip ci]"
            git push origin HEAD:main
            echo "index.html updated and pushed."
          fi
